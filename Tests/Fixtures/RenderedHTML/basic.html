<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px 18px;
      line-height: 1.55;
      background: rgba(255,255,255,0.96);
      color: #1f2328;
    }
    h1, h2, h3, h4, h5, h6 { margin: 1.0em 0 0.45em; line-height: 1.25; }
    h1 { font-size: 1.45rem; }
    h2 { font-size: 1.2rem; }
    h3 { font-size: 1.05rem; }
    p { margin: 0.55em 0; }
    code {
      background: #f6f8fa;
      border-radius: 6px;
      padding: 0.15em 0.35em;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.92em;
    }
    pre {
      background: #f6f8fa;
      border-radius: 10px;
      padding: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    pre code {
      background: transparent;
      padding: 0;
    }
    blockquote {
      border-left: 3px solid #d0d7de;
      margin: 0.75em 0;
      padding-left: 12px;
      color: #57606a;
    }
    ul { padding-left: 20px; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .meta {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      padding-bottom: 10px;
      margin-bottom: 8px;
      border-bottom: 1px solid #d8dee4;
    }
    .meta strong { font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="meta"><strong>basic.md</strong></div>
  <h1>FastMD Smoke Fixture</h1>
<p></p>
<p>This fixture renders <code>inline code</code> and a <a href="https://example.com">link</a>.</p>
<p></p>
<pre><code>print(&quot;FastMD&quot;)</code></pre>
<p></p>
</body>
</html>
